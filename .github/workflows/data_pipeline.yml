name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate_Armand.py'

jobs:
  process_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Automate Preprocessing
        run: |
          cd preprocessing
          python automate_Armand.py

      - name: Commit and Push Clean Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/dataset_preprocessing/data_clean.csv
          git commit -m "Auto-generate clean data [skip ci]" || echo "No changes to commit"
          git push